<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Autogate Utility V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased h-screen flex flex-col">

    <header class="bg-white border-b border-slate-100 p-4 sticky top-0 z-40">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-xs font-black text-primary uppercase tracking-tighter">Autogate Utility</h1>
                <p id="current-view-title" class="text-lg font-bold leading-none">Dashboard</p>
            </div>
            <div class="text-right">
                <p id="user-display" class="text-[10px] font-bold text-slate-400 uppercase">Zaky</p>
            </div>
        </div>
    </header>

    <main id="view-container" class="flex-1 overflow-y-auto">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full">
            <div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin"></div>
            <p class="mt-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Menghubungkan ke Sheets...</p>
        </div>
    </main>

    <nav class="bg-white border-t border-slate-100 p-3 pb-8 flex justify-around items-center shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
        <button onclick="changeTab('dashboard')" class="nav-item active" data-tab="dashboard">
            <span class="text-[10px] font-black uppercase">Dashboard</span>
        </button>
        <button onclick="changeTab('checker')" class="nav-item" data-tab="checker">
            <span class="text-[10px] font-black uppercase">Checker</span>
        </button>
        <button onclick="changeTab('jurnal')" class="nav-item" data-tab="jurnal">
            <span class="text-[10px] font-black uppercase">Jurnal</span>
        </button>
    </nav>

    <div id="camera-modal" class="fixed inset-0 bg-black z-[100] hidden flex flex-col">
        <video id="video" class="w-full flex-1 object-cover" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <div class="p-6 bg-black flex justify-between items-center">
            <button onclick="closeCamera()" class="text-white text-xs font-bold">BATAL</button>
            <button onclick="takePicture()" class="w-16 h-16 bg-white rounded-full border-4 border-slate-500"></button>
            <div class="w-10"></div> </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
